<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCheck Demo</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #1a1d21;
            --bg-secondary: #222529;
            --bg-tertiary: #2c2d31;
            --border: #3f4144;
            --text-primary: #d1d2d3;
            --text-secondary: #9a9c9e;
            --text-white: #ffffff;
            --accent: #667eea;
            --accent-bg: rgba(102, 126, 234, 0.15);
            --success: #2eb67d;
            --danger: #e01e5a;
            --code-bg: #161b22;
            --user-bg: #3a3d8a;
            --radius: 8px;
            --radius-lg: 12px;
        }

        html,
        body {
            width: 1280px;
            height: 720px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            width: 1280px;
            height: 720px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-white);
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            font-weight: 800;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            background: var(--accent-bg);
            color: var(--accent);
            border: 1px solid rgba(102, 126, 234, 0.35);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 6px rgba(46, 182, 125, 0.6);
        }

        #tool-status {
            padding: 7px 28px;
            font-size: 13px;
            color: var(--accent);
            background: var(--accent-bg);
            border-bottom: 1px solid var(--border);
            display: none;
            flex-shrink: 0;
            align-items: center;
            gap: 10px;
        }

        #tool-status.visible {
            display: flex;
        }

        #tool-detail {
            color: var(--text-secondary);
            font-size: 12px;
            margin-left: auto;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--accent);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #messages {
            flex: 1;
            overflow: hidden;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 78%;
            animation: fadeSlide 0.3s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            line-height: 1.65;
            font-size: 15px;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: var(--user-bg);
            color: var(--text-white);
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            display: flex;
            gap: 14px;
            margin-top: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 0 4px;
        }

        .message-bubble code {
            background: var(--code-bg);
            padding: 2px 7px;
            border-radius: 4px;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            font-size: 13.5px;
            color: #c792ea;
        }

        .code-block {
            margin: 10px 0 4px;
            background: var(--code-bg);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid #2d333b;
        }

        .code-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.04);
            font-size: 12px;
            color: var(--text-secondary);
            border-bottom: 1px solid #2d333b;
        }

        .code-block pre {
            margin: 0;
            padding: 14px 16px;
            font-family: "SF Mono", "Fira Code", Consolas, monospace;
            font-size: 13.5px;
            line-height: 1.6;
            color: #adbac7;
            white-space: pre-wrap;
        }

        .kw {
            color: #f47067;
        }

        /* keywords */
        .fn {
            color: #dcbdfb;
        }

        /* functions */
        .str {
            color: #96d0ff;
        }

        /* strings */
        .cm {
            color: #545d68;
            font-style: italic;
        }

        /* comments */
        .hl {
            color: #6cb6ff;
        }

        /* identifiers */

        .thinking {
            display: flex;
            gap: 5px;
            padding: 16px 16px;
        }

        .thinking-dot {
            width: 9px;
            height: 9px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .thinking-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-9px);
            }
        }

        footer {
            padding: 14px 28px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .input-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-controls select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 5px 10px;
            border-radius: var(--radius);
            font-size: 13px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #input {
            flex: 1;
            min-height: 44px;
            padding: 11px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.15s;
        }

        #input.focused {
            border-color: var(--accent);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: var(--radius);
            background: var(--accent);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
        }
    </style>
</head>

<body>
    <div id="app">
        <header>
            <div class="logo">
                <div class="logo-icon">V</div>
                VibeCheck
            </div>
            <div class="header-right">
                <span class="badge">⚡ Slack connected</span>
                <span class="badge"
                    style="background:rgba(46,182,125,0.12);color:#2eb67d;border-color:rgba(46,182,125,0.3)">🧑‍💻
                    Coding Agent</span>
                <div class="status-dot"></div>
            </div>
        </header>

        <div id="tool-status">
            <div class="spinner"></div>
            <span id="tool-label">Running command</span>
            <span id="tool-detail"></span>
        </div>

        <main id="messages"></main>

        <footer>
            <div class="input-controls">
                <select>
                    <option>claude-sonnet-4</option>
                    <option>claude-opus-4</option>
                </select>
                <select>
                    <option>🧑‍💻 Coding Agent</option>
                    <option>🔬 Research Agent</option>
                    <option>No Skill</option>
                </select>
            </div>
            <div class="input-wrapper">
                <textarea id="input" rows="1" placeholder="Send a message to Claude Code..."></textarea>
                <button class="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const toolStatus = document.getElementById('tool-status');
        const toolLabel = document.getElementById('tool-label');
        const toolDetail = document.getElementById('tool-detail');

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        function addMessage(role, html, meta) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = html;
            msg.appendChild(bubble);
            if (meta) {
                const m = document.createElement('div');
                m.className = 'message-meta';
                m.innerHTML = meta;
                msg.appendChild(m);
            }
            messagesEl.appendChild(msg);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return msg;
        }

        function showThinking() {
            const msg = document.createElement('div');
            msg.className = 'message assistant';
            msg.id = 'thinking';
            const b = document.createElement('div');
            b.className = 'message-bubble thinking';
            b.innerHTML = '<div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>';
            msg.appendChild(b);
            messagesEl.appendChild(msg);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
        function hideThinking() {
            const el = document.getElementById('thinking');
            if (el) el.remove();
        }

        function showTool(label, detail = '') {
            toolLabel.textContent = label;
            toolDetail.textContent = detail;
            toolStatus.classList.add('visible');
        }
        function hideTool() { toolStatus.classList.remove('visible'); }

        async function typeIntoInput(text) {
            inputEl.classList.add('focused');
            inputEl.value = '';
            for (const ch of text) {
                inputEl.value += ch;
                await sleep(32);
            }
            await sleep(350);
        }

        async function runDemo() {
            await sleep(600);

            // ── Scene 1: Fix a bug ──────────────────────────────────────
            await typeIntoInput('Find and fix the authentication bug, then write unit tests');
            await sleep(400);
            inputEl.classList.remove('focused');
            addMessage('user', 'Find and fix the authentication bug, then write unit tests');
            inputEl.value = '';

            await sleep(300);
            showThinking();
            await sleep(700);
            hideThinking();

            showTool('Reading file', 'src/auth/session.ts');
            await sleep(1000);
            showTool('Searching content', '"refreshToken"');
            await sleep(800);
            showTool('Editing file', 'src/auth/session.ts');
            await sleep(1000);
            showTool('Writing file', 'src/auth/session.test.ts');
            await sleep(900);
            showTool('Running command', 'npm test -- src/auth/session.test.ts');
            await sleep(1200);
            hideTool();

            addMessage('assistant', `
    Found the bug in <code>src/auth/session.ts</code> — session token was never
    invalidated on logout.<br><br>
    <div class="code-block">
      <div class="code-block-header"><span>typescript</span><span>session.ts</span></div>
      <pre><span class="cm">// Before — token not cleared</span>
<span class="kw">async function</span> <span class="fn">logout</span>(userId: <span class="hl">string</span>) {
  <span class="kw">await</span> db.sessions.<span class="fn">update</span>({ userId }, { active: <span class="kw">false</span> });
}

<span class="cm">// After — token invalidated immediately</span>
<span class="kw">async function</span> <span class="fn">logout</span>(userId: <span class="hl">string</span>) {
  <span class="kw">await</span> db.sessions.<span class="fn">deleteAll</span>({ userId });
  cache.<span class="fn">del</span>(<span class="str">\`session:\${userId}\`</span>);
}</pre>
    </div>
    <strong>8 unit tests written — all passing ✅</strong>`,
                '<span>$0.0038</span><span style="opacity:0.3">|</span><span>5 turns</span><span style="opacity:0.3">|</span><span>3.1k in / 0.5k out</span>');

            await sleep(2200);

            // ── Scene 2: Scheduler ─────────────────────────────────────
            await typeIntoInput('Schedule a daily dependency audit every morning at 9 AM');
            await sleep(400);
            inputEl.classList.remove('focused');
            addMessage('user', 'Schedule a daily dependency audit every morning at 9 AM');
            inputEl.value = '';

            await sleep(350);
            showThinking();
            await sleep(800);
            hideThinking();

            addMessage('assistant',
                '✅ <strong>Scheduled task created.</strong><br><br>' +
                'Every morning at <code>09:00</code>, Claude will run a full dependency audit ' +
                'and send the report to your Slack channel.<br><br>' +
                '<code>0 9 * * *</code>  ·  🧑‍💻 Coding Agent',
                '<span>$0.0009</span><span style="opacity:0.3">|</span><span>1 turn</span>');

            await sleep(2100);

            // ── Scene 3: Deploy ────────────────────────────────────────
            await typeIntoInput('Run all tests, then deploy to production if everything passes');
            await sleep(400);
            inputEl.classList.remove('focused');
            addMessage('user', 'Run all tests, then deploy to production if everything passes');
            inputEl.value = '';

            await sleep(350);
            showThinking();
            await sleep(700);
            hideThinking();

            showTool('Running command', 'npm run test:ci');
            await sleep(1100);
            showTool('Running command', 'git tag v2.5.0 && git push origin v2.5.0');
            await sleep(900);
            showTool('Running command', 'kubectl set image deployment/api api=registry/api:v2.5.0');
            await sleep(1000);
            showTool('Running command', 'kubectl rollout status deployment/api');
            await sleep(1100);
            hideTool();

            addMessage('assistant',
                '<strong>All 64 tests passed.</strong> Deployed to production successfully. 🚀<br><br>' +
                '<code>v2.5.0</code> is live at <code>api.yourapp.com</code>',
                '<span>$0.0051</span><span style="opacity:0.3">|</span><span>7 turns</span><span style="opacity:0.3">|</span><span>4.2k in / 0.7k out</span>');

            await sleep(2800);

            // Loop
            messagesEl.innerHTML = '';
            runDemo();
        }

        runDemo();
    </script>
</body>

</html>
