<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeCheck</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #1a1d21;
  --bg-secondary: #222529;
  --bg-tertiary: #2c2d31;
  --bg-hover: #35373b;
  --border: #3f4144;
  --text-primary: #d1d2d3;
  --text-secondary: #9a9c9e;
  --text-white: #ffffff;
  --accent: #667eea;
  --accent-hover: #5a6fd6;
  --accent-bg: rgba(102, 126, 234, 0.15);
  --success: #2eb67d;
  --danger: #e01e5a;
  --warning: #ecb22e;
  --code-bg: #1e1e1e;
  --user-bg: #3a3d8a;
  --radius: 8px;
  --radius-lg: 12px;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 900px;
  margin: 0 auto;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-white);
}

.logo-icon {
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--accent), #764ba2);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--danger);
  transition: background 0.3s;
}

.status-dot.connected { background: var(--success); }

/* Tool status bar */
#tool-status {
  padding: 6px 20px;
  font-size: 13px;
  color: var(--accent);
  background: var(--accent-bg);
  border-bottom: 1px solid var(--border);
  display: none;
  flex-shrink: 0;
  align-items: center;
  gap: 8px;
}

#tool-status.visible { display: flex; }

.spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--accent);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Messages area */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  display: flex;
  flex-direction: column;
  max-width: 85%;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.message.user {
  align-self: flex-end;
}

.message.assistant {
  align-self: flex-start;
}

.message-bubble {
  padding: 10px 14px;
  border-radius: var(--radius-lg);
  line-height: 1.6;
  font-size: 14px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.message.user .message-bubble {
  background: var(--user-bg);
  color: var(--text-white);
  border-bottom-right-radius: 4px;
}

.message.assistant .message-bubble {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
}

.message.error .message-bubble {
  background: rgba(224, 30, 90, 0.15);
  color: var(--danger);
  border: 1px solid rgba(224, 30, 90, 0.3);
}

/* Markdown-like rendering */
.message-bubble strong { color: var(--text-white); }
.message-bubble em { font-style: italic; }
.message-bubble a { color: var(--accent); text-decoration: none; }
.message-bubble a:hover { text-decoration: underline; }

.message-bubble code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: "SF Mono", "Fira Code", "Consolas", monospace;
  font-size: 13px;
}

.code-block {
  position: relative;
  margin: 8px 0;
  background: var(--code-bg);
  border-radius: var(--radius);
  overflow: hidden;
}

.code-block-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  background: rgba(255,255,255,0.05);
  font-size: 12px;
  color: var(--text-secondary);
}

.copy-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
}

.copy-btn:hover { background: var(--bg-hover); color: var(--text-white); }

.code-block pre {
  margin: 0;
  padding: 12px;
  overflow-x: auto;
  font-family: "SF Mono", "Fira Code", "Consolas", monospace;
  font-size: 13px;
  line-height: 1.5;
  color: #d4d4d4;
}

/* Images in messages */
.message-images {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}

.message-images img {
  max-width: 100%;
  max-height: 400px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  cursor: pointer;
}

/* Thinking indicator */
.thinking {
  display: flex;
  gap: 4px;
  padding: 16px 14px;
}

.thinking-dot {
  width: 8px;
  height: 8px;
  background: var(--text-secondary);
  border-radius: 50%;
  animation: bounce 1.4s ease-in-out infinite;
}

.thinking-dot:nth-child(2) { animation-delay: 0.2s; }
.thinking-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-8px); }
}

/* Input area */
footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg-secondary);
  flex-shrink: 0;
}

.input-wrapper {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

#input {
  flex: 1;
  min-height: 40px;
  max-height: 160px;
  padding: 10px 14px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  line-height: 1.4;
}

#input:focus { border-color: var(--accent); }

#input::placeholder { color: var(--text-secondary); }

#send-btn {
  width: 40px;
  height: 40px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}

#send-btn:hover { background: var(--accent-hover); }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

#send-btn svg { width: 18px; height: 18px; }

/* Approval modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.modal-overlay.visible { display: flex; }

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  max-width: 480px;
  width: 90%;
}

.modal h3 {
  color: var(--warning);
  margin-bottom: 12px;
  font-size: 16px;
}

.modal .paths {
  background: var(--bg-primary);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 12px;
  font-family: monospace;
  font-size: 13px;
  color: var(--text-primary);
  word-break: break-all;
}

.modal .request-text {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  line-height: 1.5;
}

.modal-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.modal-actions button {
  padding: 8px 16px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}

.btn-approve { background: var(--success); color: white; }
.btn-approve:hover { opacity: 0.9; }
.btn-permanent { background: var(--accent); color: white; }
.btn-permanent:hover { opacity: 0.9; }
.btn-deny { background: var(--danger); color: white; }
.btn-deny:hover { opacity: 0.9; }

/* Welcome screen */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  color: var(--text-secondary);
  text-align: center;
  padding: 20px;
}

.welcome h2 { color: var(--text-white); font-size: 22px; }
.welcome p { max-width: 400px; line-height: 1.6; font-size: 14px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 600px) {
  #app { max-width: 100%; }
  .message { max-width: 92%; }
  header { padding: 10px 14px; }
  #messages { padding: 14px; }
  footer { padding: 10px 14px; }
}
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">V</div>
      VibeCheck
    </div>
    <div class="status-dot" id="status-dot" title="Disconnected"></div>
  </header>

  <div id="tool-status">
    <div class="spinner"></div>
    <span id="tool-label">Claude is thinking...</span>
  </div>

  <main id="messages">
    <div class="welcome" id="welcome">
      <h2>VibeCheck</h2>
      <p>Send a message to start coding with Claude. Your conversations are automatically continued.</p>
    </div>
  </main>

  <footer>
    <div class="input-wrapper">
      <textarea id="input" rows="1" placeholder="Send a message..." autofocus></textarea>
      <button id="send-btn" title="Send (Enter)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
  </footer>
</div>

<!-- Approval modal -->
<div class="modal-overlay" id="approval-modal">
  <div class="modal">
    <h3>Security Approval Required</h3>
    <div class="paths" id="modal-paths"></div>
    <div class="request-text" id="modal-message"></div>
    <div class="modal-actions">
      <button class="btn-approve" onclick="sendApproval(true, false)">Approve</button>
      <button class="btn-permanent" onclick="sendApproval(true, true)">Approve (Permanent)</button>
      <button class="btn-deny" onclick="sendApproval(false, false)">Deny</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// WebSocket Client
// ============================================================

let ws = null;
let reconnectTimer = null;
let pendingApprovalId = null;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusDot = document.getElementById('status-dot');
const toolStatus = document.getElementById('tool-status');
const toolLabel = document.getElementById('tool-label');
const welcomeEl = document.getElementById('welcome');
const approvalModal = document.getElementById('approval-modal');
const modalPaths = document.getElementById('modal-paths');
const modalMessage = document.getElementById('modal-message');

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    statusDot.classList.add('connected');
    statusDot.title = 'Connected';
    clearTimeout(reconnectTimer);
  };

  ws.onclose = () => {
    statusDot.classList.remove('connected');
    statusDot.title = 'Disconnected';
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    ws.close();
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    handleMessage(msg);
  };
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

// ============================================================
// Message handling
// ============================================================

function handleMessage(msg) {
  switch (msg.type) {
    case 'response':
      hideThinking();
      hideToolStatus();
      addMessage('assistant', msg.result, msg.images);
      break;
    case 'tool_status':
      if (msg.status === 'start') {
        showToolStatus(msg.label);
      } else {
        hideToolStatus();
      }
      break;
    case 'approval_required':
      hideThinking();
      hideToolStatus();
      showApproval(msg);
      break;
    case 'error':
      hideThinking();
      hideToolStatus();
      addMessage('error', msg.message);
      break;
    case 'pong':
      break;
  }
}

// ============================================================
// UI: Messages
// ============================================================

function addMessage(role, text, images) {
  if (welcomeEl) welcomeEl.remove();

  const msg = document.createElement('div');
  msg.className = `message ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.innerHTML = renderMarkdown(text);
  msg.appendChild(bubble);

  if (images && images.length > 0) {
    const imgContainer = document.createElement('div');
    imgContainer.className = 'message-images';
    for (const img of images) {
      const imgEl = document.createElement('img');
      imgEl.src = `data:${img.mime || 'image/png'};base64,${img.data}`;
      imgEl.alt = img.filename;
      imgEl.title = img.filename;
      imgEl.onclick = () => window.open(imgEl.src, '_blank');
      imgContainer.appendChild(imgEl);
    }
    msg.appendChild(imgContainer);
  }

  messagesEl.appendChild(msg);
  scrollToBottom();
}

function showThinking() {
  if (document.getElementById('thinking')) return;
  if (welcomeEl) welcomeEl.remove();

  const msg = document.createElement('div');
  msg.className = 'message assistant';
  msg.id = 'thinking';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble thinking';
  bubble.innerHTML = '<div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>';
  msg.appendChild(bubble);

  messagesEl.appendChild(msg);
  scrollToBottom();
}

function hideThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

function showToolStatus(label) {
  toolLabel.textContent = label;
  toolStatus.classList.add('visible');
}

function hideToolStatus() {
  toolStatus.classList.remove('visible');
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ============================================================
// UI: Approval modal
// ============================================================

function showApproval(data) {
  pendingApprovalId = data.task_id;
  modalPaths.textContent = data.paths.join('\n');
  modalMessage.textContent = `Request: ${data.message}`;
  approvalModal.classList.add('visible');
}

function sendApproval(approved, permanent) {
  send({ type: 'approval', task_id: pendingApprovalId, approved, permanent });
  approvalModal.classList.remove('visible');
  pendingApprovalId = null;
  if (approved) showThinking();
}

// ============================================================
// Markdown-lite rendering
// ============================================================

function renderMarkdown(text) {
  if (!text) return '';

  // Escape HTML first
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Code blocks: ```lang\n...\n```
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const id = 'code-' + Math.random().toString(36).slice(2, 8);
    return `<div class="code-block"><div class="code-block-header"><span>${lang || 'code'}</span><button class="copy-btn" onclick="copyCode('${id}')">Copy</button></div><pre id="${id}">${code}</pre></div>`;
  });

  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic
  text = text.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');

  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

  // Line breaks
  text = text.replace(/\n/g, '<br>');

  return text;
}

function copyCode(id) {
  const el = document.getElementById(id);
  if (el) {
    navigator.clipboard.writeText(el.textContent).then(() => {
      const btn = el.parentElement.querySelector('.copy-btn');
      if (btn) {
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
      }
    });
  }
}

// ============================================================
// Input handling
// ============================================================

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  addMessage('user', text);
  send({ type: 'query', message: text });
  showThinking();

  inputEl.value = '';
  inputEl.style.height = 'auto';
}

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

sendBtn.addEventListener('click', sendMessage);

// Start connection
connect();

// Ping keepalive
setInterval(() => send({ type: 'ping' }), 30000);
</script>
</body>
</html>
