<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeCheck</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #1a1d21;
  --bg-secondary: #222529;
  --bg-tertiary: #2c2d31;
  --bg-hover: #35373b;
  --border: #3f4144;
  --text-primary: #d1d2d3;
  --text-secondary: #9a9c9e;
  --text-white: #ffffff;
  --accent: #667eea;
  --accent-hover: #5a6fd6;
  --accent-bg: rgba(102, 126, 234, 0.15);
  --success: #2eb67d;
  --danger: #e01e5a;
  --warning: #ecb22e;
  --code-bg: #1e1e1e;
  --user-bg: #3a3d8a;
  --radius: 8px;
  --radius-lg: 12px;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 900px;
  margin: 0 auto;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-white);
}

.logo-icon {
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--accent), #764ba2);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--danger);
  transition: background 0.3s;
}

.status-dot.connected { background: var(--success); }

.schedule-toggle {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 4px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.schedule-toggle:hover { background: var(--bg-hover); color: var(--text-white); }

/* Tool status bar */
#tool-status {
  padding: 6px 20px;
  font-size: 13px;
  color: var(--accent);
  background: var(--accent-bg);
  border-bottom: 1px solid var(--border);
  display: none;
  flex-shrink: 0;
  align-items: center;
  gap: 8px;
}

#tool-status.visible { display: flex; }

#tool-detail {
  color: var(--text-secondary);
  font-size: 12px;
  margin-left: auto;
  max-width: 300px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--accent);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Messages area */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  display: flex;
  flex-direction: column;
  max-width: 85%;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.message.user { align-self: flex-end; }
.message.assistant { align-self: flex-start; }

.message-bubble {
  padding: 10px 14px;
  border-radius: var(--radius-lg);
  line-height: 1.6;
  font-size: 14px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.message.user .message-bubble {
  background: var(--user-bg);
  color: var(--text-white);
  border-bottom-right-radius: 4px;
}

.message.assistant .message-bubble {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
}

.message.error .message-bubble {
  background: rgba(224, 30, 90, 0.15);
  color: var(--danger);
  border: 1px solid rgba(224, 30, 90, 0.3);
}

/* Response metadata */
.message-meta {
  display: flex;
  gap: 12px;
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-secondary);
  padding: 0 4px;
}

.message-meta span { display: flex; align-items: center; gap: 3px; }

/* Markdown-like rendering */
.message-bubble strong { color: var(--text-white); }
.message-bubble em { font-style: italic; }
.message-bubble a { color: var(--accent); text-decoration: none; }
.message-bubble a:hover { text-decoration: underline; }

.message-bubble code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: "SF Mono", "Fira Code", "Consolas", monospace;
  font-size: 13px;
}

.code-block {
  position: relative;
  margin: 8px 0;
  background: var(--code-bg);
  border-radius: var(--radius);
  overflow: hidden;
}

.code-block-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  background: rgba(255,255,255,0.05);
  font-size: 12px;
  color: var(--text-secondary);
}

.copy-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
}

.copy-btn:hover { background: var(--bg-hover); color: var(--text-white); }

.code-block pre {
  margin: 0;
  padding: 12px;
  overflow-x: auto;
  font-family: "SF Mono", "Fira Code", "Consolas", monospace;
  font-size: 13px;
  line-height: 1.5;
  color: #d4d4d4;
}

/* Images in messages */
.message-images {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}

.message-images img {
  max-width: 100%;
  max-height: 400px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  cursor: pointer;
}

/* Thinking indicator */
.thinking {
  display: flex;
  gap: 4px;
  padding: 16px 14px;
}

.thinking-dot {
  width: 8px;
  height: 8px;
  background: var(--text-secondary);
  border-radius: 50%;
  animation: bounce 1.4s ease-in-out infinite;
}

.thinking-dot:nth-child(2) { animation-delay: 0.2s; }
.thinking-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-8px); }
}

/* Input area */
footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg-secondary);
  flex-shrink: 0;
}

.input-controls {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}

.input-controls select {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 4px 8px;
  border-radius: var(--radius);
  font-size: 12px;
  cursor: pointer;
  outline: none;
}

.input-controls select:focus { border-color: var(--accent); }

.input-wrapper {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

#input {
  flex: 1;
  min-height: 40px;
  max-height: 160px;
  padding: 10px 14px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  line-height: 1.4;
}

#input:focus { border-color: var(--accent); }
#input::placeholder { color: var(--text-secondary); }

.action-btn {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: var(--radius);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}

#send-btn {
  background: var(--accent);
}

#send-btn:hover { background: var(--accent-hover); }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#send-btn svg { width: 18px; height: 18px; }

#stop-btn {
  background: var(--danger);
  display: none;
}

#stop-btn:hover { opacity: 0.9; }
#stop-btn svg { width: 18px; height: 18px; }

/* Approval modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.modal-overlay.visible { display: flex; }

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  max-width: 480px;
  width: 90%;
}

.modal h3 {
  color: var(--warning);
  margin-bottom: 12px;
  font-size: 16px;
}

.modal .paths {
  background: var(--bg-primary);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 12px;
  font-family: monospace;
  font-size: 13px;
  color: var(--text-primary);
  word-break: break-all;
}

.modal .request-text {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  line-height: 1.5;
}

.modal-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.modal-actions button {
  padding: 8px 16px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}

.btn-approve { background: var(--success); color: white; }
.btn-approve:hover { opacity: 0.9; }
.btn-permanent { background: var(--accent); color: white; }
.btn-permanent:hover { opacity: 0.9; }
.btn-deny { background: var(--danger); color: white; }
.btn-deny:hover { opacity: 0.9; }

/* Schedule panel */
#schedule-panel {
  position: fixed;
  top: 0;
  right: -380px;
  width: 380px;
  height: 100%;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  z-index: 90;
  transition: right 0.3s ease;
  display: flex;
  flex-direction: column;
}

#schedule-panel.open { right: 0; }

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.panel-header h3 {
  color: var(--text-white);
  font-size: 16px;
}

.panel-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 20px;
  padding: 0 4px;
}

.panel-close:hover { color: var(--text-white); }

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

/* Schedule add form */
.schedule-form {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.schedule-form input,
.schedule-form select {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 8px 12px;
  border-radius: var(--radius);
  font-size: 13px;
  outline: none;
}

.schedule-form input:focus,
.schedule-form select:focus { border-color: var(--accent); }

.schedule-form input::placeholder { color: var(--text-secondary); }

.schedule-form button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}

.schedule-form button:hover { background: var(--accent-hover); }

.schedule-form label {
  font-size: 12px;
  color: var(--text-secondary);
}

/* Schedule task items */
.schedule-task {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
}

.schedule-task-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.schedule-task-cron {
  font-family: monospace;
  font-size: 13px;
  color: var(--accent);
}

.schedule-task-actions {
  display: flex;
  gap: 6px;
}

.schedule-task-actions button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
}

.schedule-task-actions button:hover { background: var(--bg-hover); color: var(--text-white); }
.schedule-task-actions button.active { border-color: var(--success); color: var(--success); }
.schedule-task-actions button.remove:hover { border-color: var(--danger); color: var(--danger); }

.schedule-task-msg {
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.4;
}

.schedule-task-skill {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.schedule-empty {
  color: var(--text-secondary);
  font-size: 13px;
  text-align: center;
  padding: 20px 0;
}

/* Welcome screen */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  color: var(--text-secondary);
  text-align: center;
  padding: 20px;
}

.welcome h2 { color: var(--text-white); font-size: 22px; }
.welcome p { max-width: 400px; line-height: 1.6; font-size: 14px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 600px) {
  #app { max-width: 100%; }
  .message { max-width: 92%; }
  header { padding: 10px 14px; }
  #messages { padding: 14px; }
  footer { padding: 10px 14px; }
  .input-controls { flex-wrap: wrap; }
  #schedule-panel { width: 100%; right: -100%; }
}
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="header-left">
      <div class="logo">
        <div class="logo-icon">V</div>
        VibeCheck
      </div>
    </div>
    <div class="header-right">
      <button class="schedule-toggle" id="schedule-btn" onclick="toggleSchedulePanel()" title="Scheduled Tasks">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        Schedule
      </button>
      <div class="status-dot" id="status-dot" title="Disconnected"></div>
    </div>
  </header>

  <div id="tool-status">
    <div class="spinner"></div>
    <span id="tool-label">Claude is thinking...</span>
    <span id="tool-detail"></span>
  </div>

  <main id="messages">
    <div class="welcome" id="welcome">
      <h2>VibeCheck</h2>
      <p>Send a message to start coding with Claude. Your conversations are automatically continued.</p>
    </div>
  </main>

  <footer>
    <div class="input-controls">
      <select id="model-select" title="Model">
        <option value="">Default Model</option>
        <option value="claude-sonnet-4-20250514">Sonnet</option>
        <option value="claude-opus-4-20250514">Opus</option>
        <option value="claude-haiku-3-5-20241022">Haiku</option>
      </select>
      <select id="skill-select" title="Skill">
        <option value="">No Skill</option>
      </select>
    </div>
    <div class="input-wrapper">
      <textarea id="input" rows="1" placeholder="Send a message..." autofocus></textarea>
      <button class="action-btn" id="send-btn" title="Send (Enter)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
      <button class="action-btn" id="stop-btn" title="Stop">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>
    </div>
  </footer>
</div>

<!-- Approval modal -->
<div class="modal-overlay" id="approval-modal">
  <div class="modal">
    <h3>Security Approval Required</h3>
    <div class="paths" id="modal-paths"></div>
    <div class="request-text" id="modal-message"></div>
    <div class="modal-actions">
      <button class="btn-approve" onclick="sendApproval(true, false)">Approve</button>
      <button class="btn-permanent" onclick="sendApproval(true, true)">Approve (Permanent)</button>
      <button class="btn-deny" onclick="sendApproval(false, false)">Deny</button>
    </div>
  </div>
</div>

<!-- Schedule panel -->
<div id="schedule-panel">
  <div class="panel-header">
    <h3>Scheduled Tasks</h3>
    <button class="panel-close" onclick="toggleSchedulePanel()">&times;</button>
  </div>
  <div class="panel-body">
    <div class="schedule-form">
      <label>Cron Expression</label>
      <input type="text" id="sched-cron" placeholder="*/30 * * * * (every 30 min)">
      <label>Message</label>
      <input type="text" id="sched-message" placeholder="Check server health">
      <label>Skill (optional)</label>
      <select id="sched-skill">
        <option value="">None</option>
      </select>
      <button onclick="addScheduleTask()">Add Task</button>
    </div>
    <div id="schedule-list">
      <div class="schedule-empty">No scheduled tasks</div>
    </div>
  </div>
</div>

<script>
// ============================================================
// State
// ============================================================

let ws = null;
let reconnectTimer = null;
let isProcessing = false;
let streamingBubble = null;
let streamingText = '';
let skills = [];

const $ = (id) => document.getElementById(id);
const messagesEl = $('messages');
const inputEl = $('input');
const sendBtn = $('send-btn');
const stopBtn = $('stop-btn');
const statusDot = $('status-dot');
const toolStatus = $('tool-status');
const toolLabel = $('tool-label');
const toolDetail = $('tool-detail');
const welcomeEl = $('welcome');
const approvalModal = $('approval-modal');
const modalPaths = $('modal-paths');
const modalMessage = $('modal-message');
const modelSelect = $('model-select');
const skillSelect = $('skill-select');
const schedulePanel = $('schedule-panel');

// ============================================================
// WebSocket
// ============================================================

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    statusDot.classList.add('connected');
    statusDot.title = 'Connected';
    clearTimeout(reconnectTimer);
    // Load skills on connect
    send({ type: 'skill_list' });
  };

  ws.onclose = () => {
    statusDot.classList.remove('connected');
    statusDot.title = 'Disconnected';
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    handleMessage(msg);
  };
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

// ============================================================
// Message handling
// ============================================================

function handleMessage(msg) {
  switch (msg.type) {
    case 'streaming_chunk':
      handleStreamingChunk(msg.delta, msg.index);
      break;

    case 'response':
      finalizeStreaming();
      hideThinking();
      hideToolStatus();
      setProcessing(false);
      addMessage('assistant', msg.result, msg.images, {
        cost_usd: msg.cost_usd,
        num_turns: msg.num_turns,
        usage: msg.usage,
      });
      break;

    case 'tool_status':
      if (msg.status === 'start') {
        showToolStatus(msg.label, msg.detail);
      } else {
        hideToolStatus();
      }
      break;

    case 'approval_required':
      hideThinking();
      hideToolStatus();
      showApproval(msg);
      break;

    case 'error':
      finalizeStreaming();
      hideThinking();
      hideToolStatus();
      setProcessing(false);
      addMessage('error', msg.message);
      break;

    case 'skill_list_response':
      skills = msg.skills || [];
      populateSkills();
      break;

    case 'schedule_list_response':
      renderScheduleList(msg.tasks || []);
      break;

    case 'schedule_add_response':
      if (msg.success) {
        $('sched-cron').value = '';
        $('sched-message').value = '';
        send({ type: 'schedule_list' });
      } else {
        alert('Failed to add task: ' + (msg.error || 'unknown error'));
      }
      break;

    case 'pong':
      break;
  }
}

// ============================================================
// Streaming
// ============================================================

function handleStreamingChunk(delta, index) {
  hideThinking();

  if (!streamingBubble) {
    if (welcomeEl && welcomeEl.parentNode) welcomeEl.remove();
    const msgEl = document.createElement('div');
    msgEl.className = 'message assistant';
    msgEl.id = 'streaming-msg';

    streamingBubble = document.createElement('div');
    streamingBubble.className = 'message-bubble';
    msgEl.appendChild(streamingBubble);

    messagesEl.appendChild(msgEl);
    streamingText = '';
  }

  streamingText += delta;
  streamingBubble.innerHTML = renderMarkdown(streamingText);
  scrollToBottom();
}

function finalizeStreaming() {
  if (streamingBubble) {
    const streamingMsg = $('streaming-msg');
    if (streamingMsg) streamingMsg.remove();
    streamingBubble = null;
    streamingText = '';
  }
}

// ============================================================
// Processing state
// ============================================================

function setProcessing(val) {
  isProcessing = val;
  sendBtn.style.display = val ? 'none' : 'flex';
  stopBtn.style.display = val ? 'flex' : 'none';
  inputEl.disabled = val;
}

// ============================================================
// Skills
// ============================================================

function populateSkills() {
  // Main skill select
  skillSelect.innerHTML = '<option value="">No Skill</option>';
  // Schedule skill select
  const schedSkill = $('sched-skill');
  schedSkill.innerHTML = '<option value="">None</option>';

  for (const s of skills) {
    const opt1 = document.createElement('option');
    opt1.value = s.id;
    opt1.textContent = `${s.icon} ${s.name}`;
    skillSelect.appendChild(opt1);

    const opt2 = document.createElement('option');
    opt2.value = s.id;
    opt2.textContent = `${s.icon} ${s.name}`;
    schedSkill.appendChild(opt2);
  }
}

// ============================================================
// UI: Messages
// ============================================================

function addMessage(role, text, images, meta) {
  if (welcomeEl && welcomeEl.parentNode) welcomeEl.remove();

  const msg = document.createElement('div');
  msg.className = `message ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.innerHTML = renderMarkdown(text);
  msg.appendChild(bubble);

  // Images
  if (images && images.length > 0) {
    const imgContainer = document.createElement('div');
    imgContainer.className = 'message-images';
    for (const img of images) {
      const imgEl = document.createElement('img');
      imgEl.src = `data:${img.mime || 'image/png'};base64,${img.data}`;
      imgEl.alt = img.filename;
      imgEl.title = img.filename;
      imgEl.onclick = () => window.open(imgEl.src, '_blank');
      imgContainer.appendChild(imgEl);
    }
    msg.appendChild(imgContainer);
  }

  // Response metadata (cost, tokens, turns)
  if (meta && role === 'assistant') {
    const metaEl = document.createElement('div');
    metaEl.className = 'message-meta';
    const parts = [];
    if (meta.cost_usd !== undefined) {
      parts.push(`<span>$${meta.cost_usd.toFixed(4)}</span>`);
    }
    if (meta.num_turns !== undefined) {
      parts.push(`<span>${meta.num_turns} turn${meta.num_turns !== 1 ? 's' : ''}</span>`);
    }
    if (meta.usage) {
      const totalIn = (meta.usage.input_tokens || 0) + (meta.usage.cache_read_input_tokens || 0) + (meta.usage.cache_creation_input_tokens || 0);
      const totalOut = meta.usage.output_tokens || 0;
      parts.push(`<span>${formatTokens(totalIn)} in / ${formatTokens(totalOut)} out</span>`);
    }
    if (parts.length > 0) {
      metaEl.innerHTML = parts.join('<span style="opacity:0.3">|</span>');
      msg.appendChild(metaEl);
    }
  }

  messagesEl.appendChild(msg);
  scrollToBottom();
}

function formatTokens(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n);
}

function showThinking() {
  if ($('thinking')) return;
  if (welcomeEl && welcomeEl.parentNode) welcomeEl.remove();

  const msg = document.createElement('div');
  msg.className = 'message assistant';
  msg.id = 'thinking';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble thinking';
  bubble.innerHTML = '<div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>';
  msg.appendChild(bubble);

  messagesEl.appendChild(msg);
  scrollToBottom();
}

function hideThinking() {
  const el = $('thinking');
  if (el) el.remove();
}

function showToolStatus(label, detail) {
  toolLabel.textContent = label;
  toolDetail.textContent = detail || '';
  toolStatus.classList.add('visible');
}

function hideToolStatus() {
  toolStatus.classList.remove('visible');
  toolDetail.textContent = '';
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ============================================================
// UI: Approval modal
// ============================================================

function showApproval(data) {
  modalPaths.textContent = data.paths.join('\n');
  modalMessage.textContent = `Request: ${data.message}`;
  approvalModal.classList.add('visible');
}

function sendApproval(approved, permanent) {
  send({ type: 'approval', approved, permanent });
  approvalModal.classList.remove('visible');
  if (approved) showThinking();
}

// ============================================================
// UI: Schedule panel
// ============================================================

function toggleSchedulePanel() {
  const isOpen = schedulePanel.classList.toggle('open');
  if (isOpen) {
    send({ type: 'schedule_list' });
  }
}

function addScheduleTask() {
  const cron = $('sched-cron').value.trim();
  const message = $('sched-message').value.trim();
  const skillId = $('sched-skill').value || undefined;

  if (!cron || !message) {
    alert('Cron expression and message are required');
    return;
  }

  send({ type: 'schedule_add', cron, message, skill_id: skillId });
}

function renderScheduleList(tasks) {
  const container = $('schedule-list');
  if (tasks.length === 0) {
    container.innerHTML = '<div class="schedule-empty">No scheduled tasks</div>';
    return;
  }

  container.innerHTML = tasks.map(t => `
    <div class="schedule-task">
      <div class="schedule-task-header">
        <span class="schedule-task-cron">${escapeHtml(t.cron)}</span>
        <div class="schedule-task-actions">
          <button class="${t.enabled ? 'active' : ''}"
                  onclick="toggleScheduleTask('${t.id}', ${!t.enabled})">
            ${t.enabled ? 'ON' : 'OFF'}
          </button>
          <button class="remove" onclick="removeScheduleTask('${t.id}')">Remove</button>
        </div>
      </div>
      <div class="schedule-task-msg">${escapeHtml(t.message)}</div>
      ${t.skill_id ? `<div class="schedule-task-skill">Skill: ${escapeHtml(t.skill_id)}</div>` : ''}
    </div>
  `).join('');
}

function toggleScheduleTask(id, enabled) {
  send({ type: 'schedule_toggle', id, enabled });
  setTimeout(() => send({ type: 'schedule_list' }), 200);
}

function removeScheduleTask(id) {
  if (confirm('Remove this scheduled task?')) {
    send({ type: 'schedule_remove', id });
    setTimeout(() => send({ type: 'schedule_list' }), 200);
  }
}

// ============================================================
// Markdown-lite rendering
// ============================================================

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderMarkdown(text) {
  if (!text) return '';

  // Escape HTML first
  text = escapeHtml(text);

  // Code blocks: ```lang\n...\n```
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const id = 'code-' + Math.random().toString(36).slice(2, 8);
    return `<div class="code-block"><div class="code-block-header"><span>${lang || 'code'}</span><button class="copy-btn" onclick="copyCode('${id}')">Copy</button></div><pre id="${id}">${code}</pre></div>`;
  });

  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic
  text = text.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');

  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

  // Line breaks
  text = text.replace(/\n/g, '<br>');

  return text;
}

function copyCode(id) {
  const el = $(id);
  if (el) {
    navigator.clipboard.writeText(el.textContent).then(() => {
      const btn = el.parentElement.querySelector('.copy-btn');
      if (btn) {
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
      }
    });
  }
}

// ============================================================
// Input handling
// ============================================================

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isProcessing) return;

  addMessage('user', text);

  const payload = { type: 'query', message: text };
  const model = modelSelect.value;
  const skillId = skillSelect.value;
  if (model) payload.model = model;
  if (skillId) payload.skill_id = skillId;

  send(payload);
  showThinking();
  setProcessing(true);

  inputEl.value = '';
  inputEl.style.height = 'auto';
}

function stopProcessing() {
  send({ type: 'interrupt' });
}

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

sendBtn.addEventListener('click', sendMessage);
stopBtn.addEventListener('click', stopProcessing);

// ============================================================
// Init
// ============================================================

connect();

// Ping keepalive
setInterval(() => send({ type: 'ping' }), 30000);
</script>
